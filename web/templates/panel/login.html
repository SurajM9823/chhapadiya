{% extends "panel/base.html" %}
{% block title %} — Login{% endblock %}
{% block login_content %}
<div class="max-w-sm mx-auto mt-20 bg-white rounded-xl shadow p-8">
    <h1 class="text-2xl font-bold mb-6 text-center">Admin Login</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <input name="username" type="text" placeholder="Username" required
            class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400">
        <input name="password" type="password" placeholder="Password" required
            class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400">
        <button type="submit" class="w-full bg-gray-900 text-white py-2 rounded text-sm hover:bg-gray-700">Login</button>
    </form>
</div>
{% endblock %}
